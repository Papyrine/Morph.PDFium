image: Visual Studio 2022
environment:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
build_script:
- appveyor DownloadFile https://dot.net/v1/dotnet-install.ps1
- pwsh: ./dotnet-install.ps1 -JSonFile global.json -Architecture x64 -InstallDir 'C:\Program Files\dotnet'
- dotnet build src --configuration Release
- dotnet run --project src/Morph.PDFium.Tests --configuration Release --no-build -- --report-trx
on_failure:
  - ps: |
      $root = (Get-Location).Path
      Get-ChildItem *.received.* -Recurse | % {
        $rel = $_.FullName.Substring($root.Length + 1)
        Push-AppveyorArtifact $_.FullName -FileName $rel
      }
test: off
on_finish:
- pwsh: |
    $url = "https://ci.appveyor.com/api/testresults/mstest/$env:APPVEYOR_JOB_ID"
    $client = [System.Net.WebClient]::new()
    foreach ($trx in Get-ChildItem -Recurse -Filter *.trx -ErrorAction SilentlyContinue)
    {
      Write-Host "Uploading $($trx.FullName)"
      $client.UploadFile($url, $trx.FullName)
    }
artifacts:
- path: nugets\*.nupkg
